name: Auto Renew Server

on:
  schedule:
    # 每天 UTC 时间凌晨 2:00 运行一次 (可以根据需要修改 Cron 表达式)
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许在 GitHub 网页上手动点击运行

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 安装 Playwright 所需的浏览器内核及系统依赖 (CloakBrowser 基于 Playwright)
        playwright install chromium
        playwright install-deps chromium
        
    - name: 启用 WARP 网络
      uses: fscarmen/warp-on-actions@v1.3
      with:
          stack: dual
          mode: client

    - name: 修复 DNS
      run: |
          echo "[INFO] 停用 systemd-resolved，设置公共 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sleep 2

          echo "[INFO] DNS 测试:"
          nslookup dash.aclclouds.com 1.1.1.1 || echo "[WARN] 解析失败"

          echo ""
          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || true

    - name: Run Renew Script
      env:
        RENEW_URL: ${{ secrets.RENEW_URL }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python main.py
