name: Auto Renew Server

on:
  schedule:
    # 每天 UTC 时间凌晨 2:00 运行一次
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        npm install

    # 修正后的安装顺序：先 install 依赖，再装浏览器，不会再有警告
    - name: Install Playwright Browsers
      run: |
        npx playwright install chromium
        npx playwright install-deps chromium

    - name: Setup Gost Proxy
      run: |
        # 下载并解压 Gost
        wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
        gunzip -f gost-linux-amd64-2.11.5.gz
        chmod +x gost-linux-amd64-2.11.5
        
        # 启动 Gost 隧道
        echo "🔗 正在启动 Gost 隧道..."
        ./gost-linux-amd64-2.11.5 -L=http://:1080 -F="${{ secrets.SOCKS5_URL }}" > gost.log 2>&1 &
        
        # 等待隧道启动
        sleep 5
        
        # 验证代理连通性并设置环境变量
        if curl -I -s --max-time 15 -x http://127.0.0.1:1080 https://www.google.com > /dev/null; then
          echo "✅ Gost 代理启动成功！"
          echo "ALL_PROXY=http://127.0.0.1:1080" >> $GITHUB_ENV
          echo "http_proxy=http://127.0.0.1:1080" >> $GITHUB_ENV
          echo "https_proxy=http://127.0.0.1:1080" >> $GITHUB_ENV
        else
          echo "❌ Gost 代理连接失败，请检查 SOCKS5_URL 配置。"
          cat gost.log
          exit 1
        fi

    - name: Run Renew Script
      env:
        RENEW_URL: ${{ secrets.RENEW_URL }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        npm start
