name: Auto Renew Server

on:
  schedule:
    # 每天 UTC 时间凌晨 2:00 运行一次 (可以根据需要修改 Cron 表达式)
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许在 GitHub 网页上手动点击运行

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 安装 Playwright 所需的浏览器内核及系统依赖 (CloakBrowser 基于 Playwright)
        playwright install chromium
        playwright install-deps chromium

    - name: Run Renew Script
      env:
        RENEW_URL: ${{ secrets.RENEW_URL }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python main.py
